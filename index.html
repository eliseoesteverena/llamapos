 <!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="LlamaPOS — Sistema de Punto de Venta">
  <title>LlamaPOS</title>
  <link rel="stylesheet" href="./assets/css/main.css">
  <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="shortcut icon" href="/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-title" content="llamaPOS" />
  <link rel="manifest" href="/site.webmanifest" />
</head>
<body>

  <!-- Shell de la aplicación -->
  <div class="app-shell">
    <!-- La navbar se monta aquí por JS -->
    <div id="navbar"></div>

    <!-- El router monta cada vista aquí -->
    <main id="main" class="main-content">
      <!-- Estado de carga inicial -->
      <div class="flex-center" style="min-height: 60vh;">
        <span class="text-muted">Cargando...</span>
      </div>
    </main>
  </div>

  <!--
    type="module" es clave:
    - Habilita ES6 imports/exports
    - Ejecuta el script como módulo (scope propio, no global)
    - Ejecuta defer automáticamente (el DOM ya está listo)
  -->
  <script type="module" src="./app.js"></script>
</body>
</html>
